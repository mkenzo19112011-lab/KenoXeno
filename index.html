    <style>
    .nama-rgb {
    font-size: 1.5rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    
    /* Efek Gradasi Warna */
    background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 400% 400%;
    
    /* Animasi Gerak Pelangi */
    animation: rgbMove 5s linear infinite;
    
    /* Tambahin glow biar makin nyala */
    filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
}

@keyframes rgbMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
    .gallery-container {
    width: 100%;
    max-width: 350px;
    margin-top: 30px;
    text-align: center;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 kolom sejajar */
    gap: 10px;
}

.gallery-item {
    aspect-ratio: 1 / 1; /* Biar kotak sempurna */
    background: #1a1a1a;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #333;
    transition: transform 0.3s ease;
}

.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.gallery-item:hover {
    transform: scale(1.05);
    border-color: #8a2be2;
}
    /* Efek Fade In untuk seluruh halaman */
body {
    animation: fadeInPage 1.2s ease-out forwards;
}

@keyframes fadeInPage {
    from {
        opacity: 0;
        transform: translateY(20px); /* Muncul dari bawah sedikit */
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Biar lebih pro, kasih delay sedikit buat tombol-tombolnya */
.links-container {
    animation: fadeInPage 1.5s ease-out forwards;
}
    /* Efek Bintang Jatuh */
.night {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  transform: rotateZ(45deg);
  z-index: -1;
  pointer-events: none;
}
/* 1. Reset Container Night */
.night {
  position: fixed; /* Tetap di layar walau di-scroll */
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  transform: rotateZ(45deg); /* Memiringkan seluruh area bintang */
  z-index: -1;
  pointer-events: none;
}

.shooting_star {
  position: absolute;
  /* Kita hilangkan top 50% left 50% yang tadi */
  height: 2px;
  background: linear-gradient(-45deg, #5f9fff, rgba(0, 0, 255, 0));
  border-radius: 999px;
  filter: drop-shadow(0 0 6px #699bff);
  animation: tail 3000ms ease-in-out infinite, shooting 3000ms ease-in-out infinite;
}

/* 2. Sebar Bintang ke Seluruh Area (Gunakan posisi minus agar muncul dari luar layar) */
.shooting_star:nth-child(1) { top: 0%; left: 0%; animation-delay: 0s; }
.shooting_star:nth-child(2) { top: 20%; left: 20%; animation-delay: 1000ms; }
.shooting_star:nth-child(3) { top: 40%; left: -10%; animation-delay: 2000ms; }
.shooting_star:nth-child(4) { top: 60%; left: 10%; animation-delay: 1500ms; }
.shooting_star:nth-child(5) { top: 80%; left: -20%; animation-delay: 2500ms; }
.shooting_star:nth-child(6) { top: 10%; left: 50%; animation-delay: 500ms; }

/* 3. Perbesar Jarak Jatuhnya */
@keyframes shooting {
  0% { transform: translateX(0); }
  100% { transform: translateX(1200px); } /* Dibikin jauh biar lewat layar */
}


@keyframes tail {
  0% { width: 0; }
  30% { width: 100px; }
  100% { width: 0; }
}

@keyframes shining {
  0% { width: 0; }
  50% { width: 30px; }
  100% { width: 0; }
}

@keyframes shooting {
  0% { transform: translateX(0); }
  100% { transform: translateX(300px); }
}

<script>
document.querySelectorAll('.link-card').forEach(button => {
    button.addEventListener('click', function(e) {
        let x = e.clientX - e.target.offsetLeft;
        let y = e.clientY - e.target.offsetTop;
        
        let ripples = document.createElement('span');
        ripples.style.left = x + 'px';
        ripples.style.top = y + 'px';
        ripples.style.position = 'absolute';
        ripples.style.width = '2px';
        ripples.style.height = '2px';
        ripples.style.background = 'rgba(255, 255, 255, 0.3)';
        ripples.style.borderRadius = '50%';
        ripples.style.transform = 'translate(-50%, -50%)';
        ripples.style.animation = 'ripple 0.6s linear';
        ripples.style.pointerEvents = 'none';
        
        this.style.position = 'relative';
        this.style.overflow = 'hidden';
        this.appendChild(ripples);
        
        setTimeout(() => { ripples.remove() }, 600);
    });
});
</script>

<style>
@keyframes ripple {
    0% { width: 0px; height: 0px; opacity: 0.5; }
    100% { width: 500px; height: 500px; opacity: 0; }
}
